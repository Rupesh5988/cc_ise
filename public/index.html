<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden border border-slate-200">
        
        <div class="bg-slate-900 p-6 text-center">
            <h1 class="text-2xl font-bold text-white flex items-center justify-center gap-2">
                <span>Secure File Vault</span>
                <span class="text-emerald-400">🔒</span>
            </h1>
            <p class="text-slate-400 text-sm mt-1">Encrypt and store your sensitive data</p>
        </div>

        <div class="p-8 space-y-6">
            
            <div>
                <label for="filename" class="block text-sm font-medium leading-6 text-slate-900 mb-2">
                    Filename reference
                </label>
                <div class="relative rounded-md shadow-sm">
                    <input type="text" id="filename" 
                           class="block w-full rounded-md border-0 py-3 px-4 text-slate-900 ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 bg-slate-50 transition-all" 
                           placeholder="e.g., secret_notes.txt">
                </div>
            </div>

            <div>
                <label for="content" class="block text-sm font-medium leading-6 text-slate-900 mb-2">
                    Secret Content
                </label>
                <textarea id="content" rows="4" 
                          class="block w-full rounded-md border-0 py-3 px-4 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 bg-slate-50 transition-all resize-none" 
                          placeholder="Type your secret message here..."></textarea>
            </div>

            <button onclick="saveSecret()" 
                    class="flex w-full justify-center rounded-lg bg-indigo-600 px-3 py-3 text-sm font-semibold leading-6 text-white shadow-md hover:bg-indigo-500 hover:shadow-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all active:scale-[0.98]">
                Secure Save
            </button>

            <div id="output" class="min-h-[3rem] text-sm text-center rounded-lg p-2 transition-all"></div>
        </div>
        
        <div class="bg-slate-50 px-8 py-4 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">End-to-end local encryption protocol</p>
        </div>
    </div>

    <script>
        async function saveSecret() {
            const filename = document.getElementById('filename').value;
            const text = document.getElementById('content').value;
            const outputDiv = document.getElementById('output');

            // Clear previous output classes
            outputDiv.className = "min-h-[3rem] text-sm text-center rounded-lg p-2 transition-all";

            if (!filename || !text) {
                // Styled Alert (using innerHTML to avoid browser alert for better UX, 
                // but kept logic flow similar)
                outputDiv.innerHTML = '⚠️ Please fill in both fields.';
                outputDiv.classList.add('bg-yellow-50', 'text-yellow-700', 'border', 'border-yellow-200');
                return;
            }

            outputDiv.innerHTML = '<span class="animate-pulse">Encrypting...</span>';

            try {
                const response = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, text })
                });

                const result = await response.json();

                if (response.ok) {
                    outputDiv.innerHTML = `
                        <div class="flex flex-col gap-1">
                            <span class="font-bold text-emerald-700 flex items-center justify-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                Success!
                            </span>
                            <span class="font-mono text-xs bg-emerald-100 p-2 rounded text-emerald-800 break-all border border-emerald-200">
                                ${result.data.encrypted_content}
                            </span>
                        </div>`;
                    outputDiv.classList.add('bg-emerald-50', 'border', 'border-emerald-200');
                } else {
                    outputDiv.innerHTML = `❌ Error: ${result.error}`;
                    outputDiv.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                }
            } catch (error) {
                console.error('Error:', error);
                outputDiv.innerHTML = `❌ Connection failed.`;
                outputDiv.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
            }
        }
    </script>
</body>
</html>
